name: Daily Kids Story Generator

on:
  schedule:
    # Run daily at 11:00 AM IST (05:30 UTC)
    - cron: '30 5 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Generate test video (shorter)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      language:
        description: 'Video language'
        required: false
        default: 'english'
        type: choice
        options:
          - 'english'
          - 'hindi'
          - 'tamil'
          - 'telugu'
          - 'kannada'
          - 'malayalam'
          - 'bengali'
          - 'marathi'

permissions:
  contents: write  # Required to create GitHub releases

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Setup YouTube credentials
        run: |
          echo '${{ secrets.YOUTUBE_CREDENTIALS }}' > youtube_credentials.json
          echo '${{ secrets.YOUTUBE_TOKEN }}' > youtube_token.json

      - name: Generate Kids Story Video
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TEST_MODE: ${{ inputs.test_mode }}
          VIDEO_LANGUAGE: ${{ inputs.language || 'english' }}
        run: |
          # Run the standalone generator script in the repository
          python kids_story_generator.py $( [ "${TEST_MODE}" = "true" ] && echo "--test" || echo "" ) --language "${VIDEO_LANGUAGE}" --groq-api-key "${GROQ_API_KEY}" --create-release

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f "./output/metadata.json" ]; then
            TITLE=$(python -c "import json; print(json.load(open('./output/metadata.json'))['title'])")
            DURATION=$(python -c "import json; print(json.load(open('./output/metadata.json'))['duration_formatted'])")
            LANGUAGE=$(python -c "import json; print(json.load(open('./output/metadata.json'))['language'])")

            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            TAG="story-${LANGUAGE,,}-${TIMESTAMP}"

            VIDEO_FILE=$(ls ./output/*.mp4 2>/dev/null | head -1)
            THUMBNAIL_FILE=$(ls ./output/thumbnail_*.png 2>/dev/null | head -1)
            RELEASE_NOTES=./output/release_notes.md

            if [ -n "$VIDEO_FILE" ]; then
              echo "Creating GitHub Release: $TAG"
              if [ -f "$RELEASE_NOTES" ]; then
                gh release create "$TAG" \
                  --title "Kids Story: $TITLE" \
                  --notes-file "$RELEASE_NOTES" \
                  "$VIDEO_FILE" \
                  ${THUMBNAIL_FILE:+"$THUMBNAIL_FILE"}
              else
                gh release create "$TAG" \
                  --title "Kids Story: $TITLE" \
                  --notes "## $TITLE\n\n**Duration:** $DURATION\n**Language:** $LANGUAGE\n\nDownload the video and thumbnail below." \
                  "$VIDEO_FILE" \
                  ${THUMBNAIL_FILE:+"$THUMBNAIL_FILE"}
              fi

              echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/$TAG"
            else
              echo "No video file found"
              exit 1
            fi
          else
            echo "No metadata.json found"
            exit 1
          fi
